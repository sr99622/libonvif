[project]
name = "camera"
version = "0.0.26"
description = "Simple MCP server for ONVIF camera"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "libonvif",
    "niquests==3.20.1",
]

# TEMPORARY: pointing libonvif at the local source directory during active
# development, since we are iterating on unpublished fixes (e.g. the
# on_error callback bug) that are not yet released to PyPI. This bypasses
# uv.lock's normal PyPI resolution entirely.
#
# TODO: once libonvif stabilizes and a fixed release is published to PyPI,
# remove this [tool.uv.sources] override, re-pin "libonvif" to that exact
# released version in [project].dependencies above, and run `uv lock` to
# regenerate uv.lock against the published package.
[tool.uv.sources]
libonvif = { path = "../libonvif/packages/libonvif" }