[project]
name = "sse"
version = "0.0.8"
description = "Minimal example MCP server using the streamable-http transport"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "starlette>=0.27.0",
    "uvicorn>=0.23.0",
    "libonvif",
    "pydantic>=2.0.0",
    "niquests",
]

[project.scripts]
sse = "sse.main:main"
motion-watcher = "sse.motion_watcher:main"

[build-system]
requires = ["uv_build>=0.8.0,<0.9.0"]
build-backend = "uv_build"

# TEMPORARY: pointing libonvif at the local source directory, matching the
# same pattern used in the camera MCP server, since we're not certain the
# libonvif version this depends on is published to PyPI yet.
[tool.uv.sources]
libonvif = { path = "../libonvif" }
