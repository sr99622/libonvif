[project]
name = "sse"
version = "0.0.1"
description = "Minimal example MCP server using the streamable-http transport"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "starlette>=0.27.0",
    "uvicorn>=0.23.0",
]

[project.scripts]
sse = "sse.main:main"

[build-system]
requires = ["uv_build>=0.8.0,<0.9.0"]
build-backend = "uv_build"
